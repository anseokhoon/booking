<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('Style'); ?>
</head>
<body>
  <div class="container">
    <header>
      <div class="title">스타웰스매니저 안석훈</div>
      <div class="subtitle">1:1 맞춤 자산관리 상담</div>
    </header>

    <div class="content">
      <h2>📅 상담 예약하기</h2>
      <div id="calendar"></div>
      <div id="slots"></div>
    </div>
  </div>

  <script>
    let currentYear = 2026;
    let currentMonth = 5;

    function renderCalendar() {
      // 여기서는 간단히 날짜 선택 UI로 대체 (더 예쁘게 원하시면 말씀해주세요)
      let html = `<h3>${currentYear}년 ${currentMonth}월</h3>`;
      html += `<button onclick="prevMonth()">← 이전</button>`;
      html += `<button onclick="nextMonth()">다음 →</button><br><br>`;

      for (let d = 1; d <= 31; d++) {
        const date = new Date(currentYear, currentMonth-1, d);
        if (date.getMonth() !== currentMonth-1) break;
        if (date.getDay() === 0) continue; // 일요일 제외

        html += `<button class="date-btn" onclick="loadSlots(${currentYear},${currentMonth},${d})">${d}일</button>`;
      }
      document.getElementById('calendar').innerHTML = html;
    }

    function loadSlots(year, month, day) {
      google.script.run
        .withSuccessHandler(slots => {
          let html = `<h3>${month}월 ${day}일 가능한 시간</h3>`;
          if (slots.length === 0) {
            html += `<p style="color:red;">해당일 모든 시간이 마감되었습니다.</p>`;
          } else {
            slots.forEach(slot => {
              html += `
                <div class="slot" onclick="book('${year}-${month.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}', '${slot.time}')">
                  ${slot.time} ~ ${parseInt(slot.time)+1}:00 
                  <span class="available">예약 가능</span>
                </div>`;
            });
          }
          document.getElementById('slots').innerHTML = html;
        })
        .getAvailableSlots(year, month, day);
    }

    function book(dateStr, timeStr) {
      const name = prompt("성함을 입력해주세요");
      const phone = prompt("연락처", "010-2213-3907");
      const memo = prompt("상담 희망사항 (선택)", "");

      if (!name || !phone) return;

      google.script.run
        .withSuccessHandler(res => {
          if (res.success) {
            alert(`🎉 ${res.message} 예약이 완료되었습니다!\nGoogle Calendar에 등록되었습니다.`);
            location.reload();
          } else {
            alert("오류: " + res.message);
          }
        })
        .bookAppointment(dateStr, timeStr, name, phone, memo);
    }

    function prevMonth() { currentMonth--; if(currentMonth<1){currentMonth=12; currentYear--;} renderCalendar(); }
    function nextMonth() { currentMonth++; if(currentMonth>12){currentMonth=1; currentYear++;} renderCalendar(); }

    window.onload = renderCalendar;
  </script>
</body>
</html>
