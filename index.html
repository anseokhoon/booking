<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background:#f4f7fa; margin:0; padding:0; }
    .header { background: linear-gradient(to right, #003087, #1e5eff); color:white; padding:20px; text-align:center; }
    .title { font-size:24px; font-weight:900; }
    .content { padding:20px; max-width:720px; margin:auto; }
    .date-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(70px,1fr)); gap:12px; margin:20px 0; }
    .date-btn { padding:16px 10px; background:white; border:2px solid #ddd; border-radius:12px; font-size:17px; font-weight:bold; }
    .slot { padding:20px; background:white; border:2px solid #eee; border-radius:14px; margin:12px 0; font-size:17.5px; display:flex; justify-content:space-between; align-items:center; }
    .available { color:#00c853; font-weight:bold; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">스타웰스매니저 안석훈</div>
    <div>1:1 맞춤 자산관리 상담</div>
  </div>

  <div class="content">
    <h2>📅 예약 날짜 선택</h2>
    <div id="calendar"></div>
    <div id="slots"></div>
  </div>

  <script>
    let year = 2026;
    let month = 5;

    function renderCalendar() {
      let html = `<p style="text-align:center; font-size:18px;">${year}년 ${month}월</p>`;
      html += `<div class="date-grid">`;
      for (let d = 1; d <= 31; d++) {
        const date = new Date(year, month-1, d);
        if (date.getMonth() !== month-1) break;
        if (date.getDay() === 0) continue;

        html += `<button class="date-btn" onclick="loadSlots(${year},${month},${d})">${d}일</button>`;
      }
      html += `</div>`;
      document.getElementById('calendar').innerHTML = html;
    }

    function loadSlots(y, m, d) {
      google.script.run
        .withSuccessHandler(slots => {
          let html = `<h3>${m}월 ${d}일 가능한 시간</h3>`;
          if (slots.length === 0) {
            html += `<p style="color:red; padding:20px;">해당일은 예약이 마감되었습니다.</p>`;
          } else {
            slots.forEach(s => {
              html += `<div class="slot" onclick="book('${y}-${m.toString().padStart(2,0)}-${d.toString().padStart(2,0)}', '${s.time}')">
                         <span>${s.time} ~ ${parseInt(s.time)+1}:00</span>
                         <span class="available">예약가능</span>
                       </div>`;
            });
          }
          document.getElementById('slots').innerHTML = html;
        })
        .getAvailableSlots(y, m, d);
    }

    function book(dateStr, timeStr) {
      const name = prompt("성함을 입력해주세요");
      const phone = prompt("연락처", "010-2213-3907");
      if (!name || !phone) return alert("성함과 연락처는 필수입니다.");

      const memo = prompt("상담 희망사항 (선택)", "");

      google.script.run
        .withSuccessHandler(r => {
          if (r.success) {
            alert(`🎉 ${r.message} 예약이 완료되었습니다!\nGoogle Calendar에 등록되었습니다.`);
          } else {
            alert("오류 발생: " + r.message);
          }
        })
        .bookAppointment(dateStr, timeStr, name, phone, memo);
    }

    window.onload = renderCalendar;
  </script>
</body>
</html>
