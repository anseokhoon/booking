<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안석훈 웰스매니저 | 맞춤 재무상담 예약</title>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    :root {
      --primary: #0f172a;
      --accent: #d4af37;
    }
    body { 
      font-family: 'Noto Sans KR', system-ui, sans-serif; 
      margin:0; background:#f8fafc; color:#1e2937; 
    }
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%);
      color: white;
      padding: 32px 20px 28px;
      text-align: center;
    }
    .header h1 { font-size: 1.55rem; font-weight: 800; margin: 0 0 8px 0; }
    .header p { margin: 0; font-size: 1.05rem; }
    .subtitle { font-size: 0.95rem; opacity: 0.85; margin-top: 12px; line-height: 1.4; }

    .container { max-width: 640px; margin: 0 auto; padding: 20px 15px; }

    .calendar-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 12px;
    }
    .day-name { text-align: center; padding: 12px 0; font-weight: 600; color: #64748b; }
    .date {
      background: white;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 10px;
      cursor: pointer;
    }
    .date:hover { background: #f1f5f9; }
    .date.today { background: #e0f2fe; font-weight: 700; }
    .date.selected { background: var(--primary); color: white; }
    .date.other-month { color: #cbd5e1; }

    .time-slots {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
      padding: 24px;
      margin-top: 20px;
    }
    .time-btn {
      padding: 18px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
      margin: 6px 0;
    }
    .time-btn.available { border-color: #10b981; }
    .time-btn.available:hover { transform: translateY(-2px); }
    .time-btn.unavailable { 
      color: #94a3b8; background: #f8fafc; cursor: not-allowed; 
    }
    .time-btn.unavailable::after {
      content: "×"; float: right; color: #ef4444; font-size: 22px;
    }
    .time-btn.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
