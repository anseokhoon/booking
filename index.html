<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안석훈 웰스매니저 | 맞춤 상담 예약</title>
  <style>
    :root { --primary: #0f172a; }
    body { 
      font-family: 'Noto Sans KR', system-ui, sans-serif; 
      margin: 0; background: #f8fafc; 
    }
    .header {
      background: linear-gradient(135deg, #0f172a, #1e40af);
      color: white;
      padding: 35px 20px;
      text-align: center;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 15px; }
    .calendar-container, .time-slots { 
      background: white; 
      border-radius: 16px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
      margin-bottom: 20px; 
    }
    .calendar-header { 
      padding: 20px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: #f1f5f9; 
    }
    .calendar-grid { 
      display: grid; 
      grid-template-columns: repeat(7, 1fr); 
      gap: 5px; 
      padding: 15px; 
    }
    .day-name { text-align: center; font-weight: 600; color: #64748b; padding: 10px 0; }
    .date { 
      height: 68px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border-radius: 12px; 
      font-size: 1.1rem; 
      cursor: pointer; 
      background: white; 
    }
    .date:hover { background: #f1f5f9; }
    .date.today { background: #bae6fd; font-weight: bold; }
