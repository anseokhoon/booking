<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안석훈 웰스매니저 | 맞춤 상담 예약</title>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    :root {
      --primary: #1e3a8a;
      --dark: #0f172a;
      --gold: #d4af37;
    }
    body { 
      font-family: 'Noto Sans KR', system-ui, sans-serif; 
      margin:0; background:#f8fafc; color:#333; 
    }
    .header {
      background: linear-gradient(135deg, var(--dark), #1e40af);
      color: white;
      padding: 20px 15px;
      text-align: center;
      position: relative;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .logo-box {
      background: #facc15;
      color: #1e3a8a;
      width: 48px; height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.4rem;
    }
    .time-btn {
      padding: 16px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
    }
    .time-btn.available:hover { border-color: #10b981; }
    .time-btn.available { border-color: #10b981; color: #166534; }
    .time-btn.unavailable { 
      color: #999; background: #f8fafc; cursor: not-allowed; 
    }
    .time-btn.unavailable::after {
      content: "×"; float: right; color: #ef4444; font-size: 20px;
    }
    .time-btn.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .info-box {
      background: #fefce8;
      border: 1px solid #fde047;
      padding: 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div class="header">
    <div class="logo">
      <div class="logo-box">안</div>
      <div>
        <div style="font-size:1.1rem; font-weight:700;">KB STAR WEALTH MANAGER</div>
        <div style="font-size:1.4rem; font-weight:800;">안석훈 웰스매니저</div>
      </div>
    </div>
    <p style="margin:8px 0 0; opacity:0.95;">PRIVATE WEALTH CONSULTATION</p>
    <h2 style="margin:15px 0 8px; font-size:1.35rem; font-weight:700;">
      의사 자산관리 전문<br>맞춤 재무상담 예약
    </h2>
    <p style="opacity:0.9; font-size:0.95rem;">
      2008년부터 의사 고객 전문 자산관리<br>
      상속·증여·절세 전략 1:1 프라이빗 상담
    </p>
  </div>

  <div style="max-width: 640px; margin: 0 auto; padding: 15px;">
    <!-- 단계 표시 -->
    <div style="display:flex; justify-content:center; gap:8px; margin:20px 0;">
      <div style="width:28px; height:28px; background:#1e3a8a; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">1</div>
      <div style="width:28px; height:28px; background:#e2e8f0; border-radius:50%; display:flex; align-items:center; justify-content:center;">2</div>
      <div style="width:28px; height:28px; background:#e2e8f0; border-radius:50%; display:flex; align-items:center; justify-content:center;">3</div>
    </div>

    <h3 style="background:#1e3a8a; color:white; padding:14px 16px; border-radius:12px; margin:0 0 12px;">
      📅 상담 날짜 선택
    </h3>

    <!-- 달력 -->
    <div style="background:white; padding:15px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.08);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <button onclick="prevMonth()" style="font-size:1.6rem; background:none; border:none;">←</button>
        <h2 id="monthTitle" style="margin:0; font-size:1.3rem;">2026년 5월</h2>
        <button onclick="nextMonth()" style="font-size:1.6rem; background:none; border:none;">→</button>
      </div>
      <div class="calendar-grid" id="calendar" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:4px; text-align:center;"></div>
    </div>

    <!-- 시간 선택 -->
    <div id="timeSlots" style="display:none; margin-top:20px;">
      <h3 id="selectedDateTitle" style="background:#1e3a8a; color:white; padding:14px; border-radius:12px; margin-bottom:12px;"></h3>
      
      <div id="timeGrid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:12px;"></div>
      
      <div class="info-box">
        <strong>💡 안내</strong><br>
        상담 1시간 + 이동 1시간 = 총 2시간 블록 자동 확보
      </div>

      <button onclick="confirmBooking()" style="width:100%; padding:18px; font-size:1.2rem; background:#1e3a8a; color:white; border:none; border-radius:12px; margin-top:10px;">
        ✅ 이 시간으로 예약하기
      </button>
    </div>
  </div>
