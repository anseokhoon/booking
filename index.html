<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안석훈 웰스매니저 | 맞춤 상담 예약</title>
  <style>
    :root { --primary: #0f172a; }
    body { 
      font-family: 'Noto Sans KR', system-ui, sans-serif; 
      margin: 0; padding: 0; background: #f8fafc; 
    }
    .header {
      background: linear-gradient(135deg, #0f172a, #1e40af);
      color: white;
      padding: 35px 20px;
      text-align: center;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 15px; }
    .calendar-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .calendar-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f1f5f9;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      padding: 15px;
    }
    .day-name { text-align: center; font-weight: 600; color: #64748b; padding: 8px 0; }
    .date {
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      background: white;
    }
    .date:hover { background: #f1f5f9; }
    .date.today { background: #bae6fd; font-weight: bold; }
    
    .time-slots {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      padding: 25px;
      display: none;
    }
    .time-btn {
      padding: 18px;
      margin: 8px 0;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
    }
    .time-btn.available { border-color: #10b981; }
    .time-btn.selected { background: var(--primary); color: white; }
    button.book {
      width: 100%;
      padding: 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      margin-top: 15px;
    }
  </style>
</head>

  <div class="header">

  </div>

        <h2 id="monthTitle" style="margin:0;">2026년 5월</h2>
        <button onclick="nextMonth()" style="font-size:1.8rem; background:none; border:none;">→</button>
      </div>
      <div class="calendar-grid" id="calendar"></div>
    </div>

    <div id="timeSlots" class="time-slots">
      <h3 id="selectedDateTitle" style="text-align:center; margin-bottom:20px;"></h3>
      <div id="timeGrid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:12px;"></div>
      <button class="book" onclick="confirmBooking()">✅ 이 시간으로 예약하기</button>
    </div>
  </div>

    }
