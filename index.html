<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안석훈 웰스매니저 | 맞춤 상담 예약</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f172a;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      margin: 0;
      background: #f8fafc;
      color: #1e2937;
    }
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%);
      color: white;
      padding: 50px 20px 40px;
      text-align: center;
    }
    .container {
      max-width: 680px;
      margin: -30px auto 40px;
      padding: 0 15px;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .calendar-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .calendar-header button {
      width: 44px; height: 44px;
      border: none; background: white;
      border-radius: 12px; font-size: 1.6rem;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 24px;
    }
    .day-name { text-align: center; font-weight: 600; color: #64748b; padding: 10px 0; }
    .date {
      height: 68px; display: flex; align-items: center; justify-content: center;
      border-radius: 16px; font-size: 1.1rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .date:hover { background: #f1f5f9; }
    .date.today { background: #eff6ff; color: var(--accent); font-weight: 700; }
    .date.selected { background: var(--accent); color: white; transform: scale(1.08); }
    .date.disabled { color: #cbd5e1; cursor: not-allowed; pointer-events: none; }

    .time-slots { padding: 28px; }
    .time-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .time-btn {
      padding: 18px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      text-align: center;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .time-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
    .time-btn.selected {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    button.book {
      width: 100%; padding: 18px; margin-top: 30px;
      background: var(--accent); color: white;
      border: none; border-radius: 16px;
      font-size: 1.25rem; font-weight: 600;
      cursor: pointer;
    }
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.65);
      align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content {
      background: white; padding: 32px; border-radius: 20px;
      max-width: 380px; width: 90%; text-align: center;
    }
    .loading { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>KB STAR WEALTH MANAGER</h1>
    <p style="font-size:1.45rem; margin:12px 0 0;">안석훈 웰스매니저</p>
  </div>

  <div class="container">
    <h2 style="text-align:center; margin:30px 0 20px; font-size:1.45rem;">맞춤 상담 예약</h2>
    
    <div class="card">
      <div class="calendar-header">
        <button onclick="prevMonth()">←</button>
        <h2 id="monthTitle" style="margin:0; font-size:1.35rem;">2026년 5월</h2>
        <button onclick="nextMonth()">→</button>
      </div>
      <div class="calendar-grid" id="calendar"></div>
    </div>

    <div id="timeSlots" class="card time-slots" style="display:none;">
      <h3 id="selectedDateTitle" style="text-align:center; margin:0 0 24px;"></h3>
      <div id="timeGrid" class="time-grid"></div>
      <button class="book" onclick="confirmBooking()">이 시간으로 예약하기</button>
    </div>
  </div>

  <!-- 예약 모달 -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3>예약 확정</h3>
      <p id="modalDateTime" style="margin:20px 0; font-size:1.1rem; color:#334155;"></p>
      
      <input type="text" id="userName" placeholder="이름을 입력해주세요" 
             style="width:100%; padding:14px; border-radius:12px; border:1px solid #cbd5e1; margin:10px 0;">
      
      <input type="tel" id="userPhone" placeholder="연락처 (010-XXXX-XXXX)" 
             style="width:100%; padding:14px; border-radius:12px; border:1px solid #cbd5e1; margin-bottom:20px;">

      <div style="display:flex; gap:12px;">
        <button onclick="closeModal()" style="flex:1; padding:16px; background:#e2e8f0; border:none; border-radius:12px;">취소</button>
        <button onclick="submitBooking()" style="flex:1; padding:16px; background:var(--accent); color:white; border:none; border-radius:12px;">예약 확정</button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWvsDx37dDnJdOkjPi3_ZPa9COrZAUrCz9Ilhtp4bxYZPkKYFjkaBXLncI_9o4vwgYHQ/exec";
    
    let currentDate = new Date(2026, 4, 12);
    let selectedSlot = null;

    function renderCalendar() { ... } // 이전 버전과 동일 (생략)

    function selectDate(year, month, day) { ... } // 이전 버전과 동일 (생략)

    function showTimeSlots(date) { ... } // 이전 버전과 동일 (생략)

    function selectTime(date, h, m, btn) { ... } // 이전 버전과 동일 (생략)

    function confirmBooking() {
      if (!selectedSlot) return alert('상담 시간을 선택해주세요.');
      
      const d = selectedSlot.date;
      const timeStr = `${d.getMonth()+1}월 ${d.getDate()}일 ${selectedSlot.h < 12 ? '오전' : '오후'} ${selectedSlot.h % 12 || 12}:${selectedSlot.m.toString().padStart(2,'0')}`;
      
      document.getElementById('modalDateTime').textContent = timeStr;
      document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('confirmModal').style.display = 'none';
    }

    async function submitBooking() {
      const name = document.getElementById('userName').value.trim();
      const phone = document.getElementById('userPhone').value.trim();

      if (!name || !phone) {
        alert('이름과 연락처를 모두 입력해주세요.');
        return;
      }

      const loading = document.createElement('div');
      loading.textContent = '예약 처리 중...';
      // 간단 로딩 표시

      try {
        const payload = {
          action: "book",
          name: name,
          phone: phone,
          date: selectedSlot.date.toISOString().split('T')[0],
          hour: selectedSlot.h,
          minute: selectedSlot.m
        };

        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'application/json' }
        });

        const result = await response.text();

        if (result.includes("success") || result.includes("완료")) {
          alert(`✅ ${name}님\n상담 예약이 완료되었습니다!\n\n상세 안내는 카카오톡/문자로 보내드리겠습니다.`);
          closeModal();
          document.getElementById('timeSlots').style.display = 'none';
          selectedSlot = null;
        } else {
          alert('예약에 실패했습니다. 다시 시도해주세요.\n\n' + result);
        }
      } catch (e) {
        alert('네트워크 오류가 발생했습니다. 다시 시도해주세요.');
        console.error(e);
      }
    }

    // 이전과 동일한 prevMonth, nextMonth, window.onload = renderCalendar;
  </script>
</body>
</html>
