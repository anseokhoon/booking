<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안석훈 웰스매니저 | 맞춤 상담 예약</title>
  <style>
    :root { --primary: #0f172a; }
    body { font-family: 'Noto Sans KR', system-ui, sans-serif; margin:0; background:#f8fafc; }
    .header { background: linear-gradient(135deg, #0f172a, #1e40af); color:white; padding:40px 20px; text-align:center; }
    .container { max-width:640px; margin:0 auto; padding:20px 15px; }
    .calendar-container { background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); overflow:hidden; margin-bottom:20px; }
    .calendar-header { padding:20px; display:flex; justify-content:space-between; align-items:center; background:#f1f5f9; }
    .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; padding:15px; }
    .day-name { text-align:center; font-weight:600; color:#64748b; padding:8px 0; }
    .date { height:70px; display:flex; align-items:center; justify-content:center; border-radius:12px; font-size:1.15rem; cursor:pointer; background:white; }
    .date:hover { background:#f1f5f9; }
    .time-slots { background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); padding:25px; display:none; }
    .time-btn { padding:18px; margin:8px 0; border:2px solid #e2e8f0; border-radius:12px; text-align:center; cursor:pointer; }
    .time-btn.available { border-color:#10b981; }
    .time-btn.selected { background:var(--primary); color:white; }
    button.book { width:100%; padding:20px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:1.2rem; margin-top:15px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>KB STAR WEALTH MANAGER</h1>
    <p style="font-size:1.35rem;margin:8px 0 0;">안석훈 웰스매니저</p>
  </div>

  <div class="container">
    <h2 style="text-align:center;margin:25px 0 15px;">📅 상담 일정 예약</h2>

    <div class="calendar-container">
      <div class="calendar-header">
        <button onclick="prevMonth()" style="font-size:1.8rem;background:none;border:none;">←</button>
        <h2 id="monthTitle">2026년 5월</h2>
        <button onclick="nextMonth()" style="font-size:1.8rem;background:none;border:none;">→</button>
      </div>
      <div class="calendar-grid" id="calendar"></div>
    </div>

    <div id="timeSlots" class="time-slots">
      <h3 id="selectedDateTitle" style="text-align:center;margin-bottom:20px;"></h3>
      <div id="timeGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;"></div>
      <button class="book" onclick="confirmBooking()">✅ 이 시간으로 예약하기</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFYE1y2vqB675Y3wU1it6LsnOCAx2lJasKmFZsgngvo6M1Uyy8TomsHhgH5wmdUHSmQQ/exec";
    let currentDate = new Date(2026, 4, 12);
    let selectedSlot = null;

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('monthTitle').textContent = `${year}년 ${month+1}월`;

      let html = '';
      ['일','월','화','수','목','금','토'].forEach(d => html += `<div class="day-name">${d}</div>`);

      const firstDay = new Date(year, month, 1).getDay();
      for (let i = 0; i < firstDay; i++) html += `<div class="date"></div>`;

      for (let day = 1; day <= 31; day++) {
        html += `<div class="date" onclick="selectDate(${year},${month},${day})">${day}</div>`;
      }
      document.getElementById('calendar').innerHTML = html;
    }

    function selectDate(year, month, day) {
      const date = new Date(year, month, day);
      document.getElementById('selectedDateTitle').textContent = `${month+1}월 ${day}일`;
      document.getElementById('timeSlots').style.display = 'block';
      showTimeSlots(date);
    }

    function showTimeSlots(date) {
      const grid = document.getElementById('timeGrid');
      grid.innerHTML = '';
      const dow = date.getDay();
      if (dow === 0) return grid.innerHTML = '<p style="text-align:center;color:red;padding:40px;">일요일은 예약 불가</p>';

      const endHour = dow === 6 ? 16 : 21;
      for (let h = 9; h < endHour; h++) {
        [0,30].forEach(m => {
          const btn = document.createElement('div');
          btn.className = 'time-btn available';
          btn.textContent = `${h<12?'오전':'오후'} ${h<13?h:h-12}:${m.toString().padStart(2,'0')}`;
          btn.onclick = () => selectTime(date, h, m, btn);
          grid.appendChild(btn);
        });
      }
    }

    function selectTime(date, h, m, btn) {
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedSlot = {date, h, m};
    }

    function confirmBooking() {
      if (!selectedSlot) return alert('시간을 선택해주세요.');
      const name = prompt("이름을 입력해주세요:");
      if (name) alert(`✅ ${name}님 예약 완료!\n\nGoogle Calendar에 등록되었습니다.`);
    }

    function prevMonth() { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
    function nextMonth() { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

    window.onload = renderCalendar;
  </script>
</body>
</html>
