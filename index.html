    .header {

      padding: 32px 20px 28px;
      text-align: center;

    .header h1 {

    .header p {

    .subtitle {

    .container { max-width: 640px; margin: 0 auto; padding: 20px 15px; }

    .calendar-container {

      margin-bottom: 20px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 12px;
      background: white;
    }
    .day-name {
      text-align: center;
      padding: 12px 0;
      font-weight: 600;
      color: #64748b;
      font-size: 0.95rem;
    }
    .date {
      background: white;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .date:hover { background: #f1f5f9; }
    .date.today { background: #e0f2fe; font-weight: 700; }
    .date.selected { background: var(--primary); color: white; }
    .date.other-month { color: #cbd5e1; }

    .time-slots {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
      padding: 24px;
      margin-top: 20px;
    }
    .time-btn {
      padding: 18px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
      margin: 6px 0;
    }
    .time-btn.available { border-color: #10b981; }
    .time-btn.available:hover { transform: translateY(-2px); }
    .time-btn.unavailable { 
      color: #94a3b8; background: #f8fafc; cursor: not-allowed; 
    }
    .time-btn.unavailable::after {
      content: "×"; float: right; color: #ef4444; font-size: 22px;
    }
    .time-btn.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    button.book {
      width: 100%;
      padding: 20px;
      font-size: 1.25rem;
      font-weight: 700;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
    }
  </style>
</head>

      }
      document.getElementById('calendar').innerHTML = html;
    }
