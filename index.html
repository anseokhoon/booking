<script>
// ==================== CONFIG ====================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXlhqsoRDG3er8GHfea7lGdYize-O4JEDNwN5abc7tG36VA432Nr_kMeTCPwWBqiys/exec";
const GOOGLE_CLIENT_ID = "555216660049-7qhpo210se6i31pt2i7bkuvodavv3hml.apps.googleusercontent.com";

let gcalConnected = false;
let gcalAccessToken = null;

// ==================== OAuth 토큰 처리 (가장 중요!) ====================
function handleOAuthCallback() {
  const hash = window.location.hash.substring(1);
  if (!hash) return;

  const params = new URLSearchParams(hash);
  const accessToken = params.get('access_token');
  const error = params.get('error');

  if (error) {
    console.error("OAuth Error:", error);
    alert("Google 로그인 중 오류가 발생했습니다: " + error);
    return;
  }

  if (accessToken) {
    gcalAccessToken = accessToken;
    gcalConnected = true;
    
    document.getElementById('gcal-btn-text').textContent = '연결됨 ✓';
    document.getElementById('gcal-status-text').textContent = 'Google Calendar 연동 완료';
    
    // URL 해시 제거 (보안)
    window.history.replaceState({}, document.title, window.location.pathname);
    
    alert("✅ Google Calendar가 성공적으로 연동되었습니다!");
  }
}

// 페이지 로드 시 토큰 확인
window.addEventListener('load', handleOAuthCallback);

// ==================== Google 로그인 ====================
function toggleGcal() {
  if (gcalConnected) {
    if (confirm("Google Calendar 연동을 해제하시겠습니까?")) {
      gcalConnected = false;
      gcalAccessToken = null;
      document.getElementById('gcal-btn-text').textContent = 'Google 로그인';
      document.getElementById('gcal-status-text').textContent = '연동하면 일정이 자동으로 추가됩니다';
    }
    return;
  }

  const redirectUri = encodeURIComponent(window.location.href.split('?')[0]);
  const scope = encodeURIComponent("https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar");
  
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
    `client_id=${GOOGLE_CLIENT_ID}&` +
    `redirect_uri=${redirectUri}&` +
    `response_type=token&` +
    `scope=${scope}&` +
    `prompt=consent`;

  window.location.href = authUrl;   // 같은 창에서 열기 (팝업 차단 방지)
}
</script>
