<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB상담예약 - seokhoonbaro 상담</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #003087 0%, #0055cc 100%);
            color: #333;
            margin: 0; padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: #FFCD00; /* KB Yellow */
            color: #003087;
            padding: 20px;
            text-align: center;
            font-weight: 900;
            font-size: 28px;
        }
        .content { padding: 30px; }
        h1, h2 { color: #003087; }
        button {
            background: #FFCD00;
            color: #003087;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #ffd633; transform: scale(1.05); }
        .slot {
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-left: 5px solid #FFCD00;
            border-radius: 8px;
            cursor: pointer;
        }
        .slot:hover { background: #fff3cc; }
        .contact { text-align: center; margin: 20px; font-size: 18px; font-weight: bold; color: #003087; }
    </style>
</head>
<body>
    <div class="container">
        <header>KB 금융 파트너 상담예약</header>
        <div class="content">
            <h1>석훈바로 상담</h1>
            <p>1시간 상담 + 1시간 이동시간을 고려한 예약 시스템입니다.<br>연락처: <strong>010-2213-3907</strong></p>
            
            <h2>예약 가능한 시간</h2>
            <div id="slots"></div>
            
            <div class="contact">
                예약 후 자동으로 Google Calendar에 등록됩니다.<br>
                문의: 010-2213-3907
            </div>
        </div>
    </div>

    <script>
        // 간단한 슬롯 생성 (실제로는 Google Calendar API 연동 필요)
        function generateSlots() {
            const slotsDiv = document.getElementById('slots');
            slotsDiv.innerHTML = `
                <p><strong>월~금:</strong> 09:00 ~ 21:00 (2시간 단위)</p>
                <p><strong>토요일:</strong> 09:00 ~ 16:00</p>
                <p style="color:#d32f2f;">일요일: 휴무</p>
                <button onclick="alert('예약이 Google Calendar에 등록되었습니다! (실제 연동 시 자동 입력)')">지금 예약하기</button>
            `;
        }
        generateSlots();
    </script>
</body>
</html>
